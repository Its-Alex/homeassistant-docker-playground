services:
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:2026.1
    restart: unless-stopped
    volumes:
      - ./volumes/homeassistant/config:/config
      - ./config/homeassistant/custom_components:/config/custom_components
      - ./config/homeassistant/python_scripts:/config/python_scripts
      - ./config/homeassistant/configuration.yaml:/config/configuration.yaml
      - ./config/homeassistant/automations.yaml:/config/automations.yaml
      - ./config/homeassistant/scenes.yaml:/config/scenes.yaml
      - ./config/homeassistant/scripts.yaml:/config/scripts.yaml
      - ./config/homeassistant/secrets.yaml:/config/secrets.yaml
      - /etc/localtime:/etc/localtime:ro
      - /run/dbus:/run/dbus:ro
    privileged: true
    network_mode: host
    environment:
      - TZ=Europe/Paris
    depends_on:
      postgres:
        condition: service_healthy
        restart: true
      music-assistant-server:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8123 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    volumes:
      - ./volumes/postgres/:/var/lib/postgresql/
    ports:
      - 5432:5432
    environment:
      - POSTGRES_USER=homeassistant
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=homeassistant
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U homeassistant"]
      interval: 30s
      timeout: 10s
      retries: 5

  music-assistant-server:
    image: ghcr.io/music-assistant/server:2.7.4
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./volumes/music-assistant-server/data:/data/
    cap_add:
      - SYS_ADMIN
      - DAC_READ_SEARCH
    security_opt:
      - apparmor:unconfined
    environment:
      - LOG_LEVEL=info

  mosquitto:
    image: eclipse-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./config/mosquitto:/mosquitto/config
      - ./volumes/mosquitto/data:/mosquitto/data

  zigbee2mqtt:
    image: ghcr.io/koenkk/zigbee2mqtt
    restart: unless-stopped
    annotations:
      run.oci.keep_original_groups: "1"
    environment:
      - TZ=Europe/Paris
      # Disable onboarding server
      - ZIGBEE2MQTT_ONBOARD_NO_SERVER=1
      # MQTT configuration (zigbee2mqtt user in config/mosquitto/passwd)
      - ZIGBEE2MQTT_CONFIG_MQTT_BASE_TOPIC=zigbee2mqtt
      - ZIGBEE2MQTT_CONFIG_MQTT_SERVER=mqtt://mosquitto:1883
      - ZIGBEE2MQTT_CONFIG_MQTT_USER=zigbee2mqtt
      - ZIGBEE2MQTT_CONFIG_MQTT_PASSWORD=zigbee2mqtt
      # Serial configuration
      - ZIGBEE2MQTT_CONFIG_SERIAL_PORT=/dev/ttyUSB0
      - ZIGBEE2MQTT_CONFIG_SERIAL_ADAPTER=ember
      - ZIGBEE2MQTT_CONFIG_SERIAL_BAUDRATE=115200
      - ZIGBEE2MQTT_CONFIG_SERIAL_RTSCTS=false
      # Advanced configuration
      - ZIGBEE2MQTT_CONFIG_ADVANCED_LOG_LEVEL=info
      - ZIGBEE2MQTT_CONFIG_FRONTEND_ENABLED=true
      - ZIGBEE2MQTT_CONFIG_FRONTEND_PORT=8080
      - ZIGBEE2MQTT_CONFIG_HOMEASSISTANT_ENABLED=true
    volumes:
      - ./volumes/zigbee2mqtt/data:/app/data
      - /run/udev:/run/udev:ro
    ports:
      - 8080:8080
    # Podman compatibility
    devices:
      - /dev/ttyUSB0:/dev/ttyUSB0
